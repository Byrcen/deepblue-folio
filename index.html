<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="杨涵淇 · AI 产品经理 — 构建 AI 时代的产品。个人作品集。" />
    <meta name="theme-color" content="#050a18" />
    <title>杨涵淇 · AI 产品经理</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='6' y='6' width='20' height='20' fill='none' stroke='%234de1ff' stroke-width='2.5'/%3E%3Crect x='13' y='13' width='6' height='6' fill='%234de1ff'/%3E%3C/svg%3E" />
  </head>
  <body>
    <!-- 加载序列 -->
    <div id="preloader" aria-hidden="true">
      <div class="pl-inner">
        <div class="pl-logo">HANQI<span class="pl-cursor">_</span></div>
        <div class="pl-lines">
          <span>BOOT / DEEP-BLUE ENGINE</span>
          <span>COMPILING SHADERS …</span>
          <span>CALIBRATING CAMERA PATH …</span>
        </div>
        <div class="pl-count">00</div>
        <div class="pl-bar"><i></i></div>
      </div>
    </div>

    <!-- 3D 舞台（固定全屏） -->
    <canvas id="stage" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="frame" aria-hidden="true"></div>

    <!-- 顶栏 -->
    <header class="topbar hud">
      <a class="logo" href="#act-vision" data-nav-to="vision" aria-label="HANQI">
        H<span class="logo-glyph"><i></i></span>NQI
      </a>
      <div class="topbar-right">
        <a class="hud-btn ghost" href="#" data-i18n="ui.login">简历</a>
        <button class="hud-btn ghost" id="lang-toggle" data-i18n="ui.lang" aria-label="切换语言">EN</button>
        <button class="hud-btn solid" id="menu-toggle"><span class="btn-glyph">▦</span><span data-i18n="ui.menu">菜单</span></button>
      </div>
    </header>

    <!-- 左侧章节导航 -->
    <nav class="chapter-nav hud" aria-label="章节">
      <a href="#act-vision" data-act-link="vision"><i></i><span data-i18n="nav.vision" data-scramble>愿景</span></a>
      <a href="#act-method" data-act-link="method"><i></i><span data-i18n="nav.method" data-scramble>方法</span></a>
      <a href="#act-collab" data-act-link="collab"><i></i><span data-i18n="nav.collab" data-scramble>协作</span></a>
      <a href="#act-works" data-act-link="works"><i></i><span data-i18n="nav.works" data-scramble>作品</span></a>
      <a href="#act-journey" data-act-link="journey"><i></i><span data-i18n="nav.journey" data-scramble>履历</span></a>
      <a href="#act-contact" data-act-link="contact"><i></i><span data-i18n="nav.contact" data-scramble>邀约</span></a>
    </nav>

    <!-- 底部 HUD -->
    <div class="hud-bottom hud">
      <button id="sound-toggle" class="hud-chip" aria-pressed="false">
        <span class="eq" aria-hidden="true"><i></i><i></i><i></i></span>
        <span data-i18n="ui.sound_off">音效 关</span>
      </button>
      <div class="scroll-hint hud-chip" id="scroll-hint">
        <span class="scroll-glyph">↕</span>
        <span data-i18n="ui.scroll">滚动探索</span>
      </div>
      <a class="hud-chip" href="mailto:hi@example.com" id="contact-chip">
        <span data-i18n="ui.contact">与我联系</span>
        <span class="chip-glyph">✉</span>
      </a>
    </div>

    <!-- 滚动长卷：六幕 -->
    <main id="scroll-track">
      <section class="act act-center" id="act-vision" data-act="vision">
        <div class="act-inner">
          <p class="kicker rv" data-i18n="acts.vision.kicker"></p>
          <h1 class="act-title rv" data-i18n="acts.vision.title" data-scramble></h1>
          <p class="act-body rv" data-i18n="acts.vision.body"></p>
          <p class="rv"><button class="cta" data-open-atlas><span class="cta-glyph">▸</span><span data-i18n="acts.vision.cta"></span></button></p>
        </div>
      </section>

      <section class="act act-center" id="act-method" data-act="method">
        <div class="act-inner">
          <p class="kicker rv" data-i18n="acts.method.kicker"></p>
          <h2 class="act-title rv" data-i18n="acts.method.title" data-scramble></h2>
          <p class="act-body rv" data-i18n="acts.method.body"></p>
          <div class="chips">
            <div class="chip rv"><b data-i18n="acts.method.chips.0.k"></b><span data-i18n="acts.method.chips.0.v"></span></div>
            <div class="chip rv"><b data-i18n="acts.method.chips.1.k"></b><span data-i18n="acts.method.chips.1.v"></span></div>
            <div class="chip rv"><b data-i18n="acts.method.chips.2.k"></b><span data-i18n="acts.method.chips.2.v"></span></div>
          </div>
        </div>
      </section>

      <section class="act act-center" id="act-collab" data-act="collab">
        <div class="act-inner">
          <p class="kicker rv" data-i18n="acts.collab.kicker"></p>
          <h2 class="act-title rv" data-i18n="acts.collab.title" data-scramble></h2>
          <p class="act-body rv" data-i18n="acts.collab.body"></p>
        </div>
      </section>

      <section class="act act-center" id="act-works" data-act="works">
        <div class="act-inner">
          <p class="kicker rv" data-i18n="acts.works.kicker"></p>
          <h2 class="act-title rv" data-i18n="acts.works.title" data-scramble></h2>
          <p class="act-body rv" data-i18n="acts.works.body"></p>
          <p class="rv"><button class="cta" data-open-atlas><span class="cta-glyph">◈</span><span data-i18n="acts.works.cta"></span></button></p>
        </div>
      </section>

      <section class="act act-left" id="act-journey" data-act="journey">
        <div class="act-inner">
          <p class="kicker rv" data-i18n="acts.journey.kicker"></p>
          <h2 class="act-title rv" data-i18n="acts.journey.title" data-scramble></h2>
          <p class="act-body rv" data-i18n="acts.journey.body"></p>
          <ol class="steps">
            <li class="rv"><b data-i18n="acts.journey.steps.0.year"></b><strong data-i18n="acts.journey.steps.0.title"></strong><span data-i18n="acts.journey.steps.0.desc"></span></li>
            <li class="rv"><b data-i18n="acts.journey.steps.1.year"></b><strong data-i18n="acts.journey.steps.1.title"></strong><span data-i18n="acts.journey.steps.1.desc"></span></li>
            <li class="rv"><b data-i18n="acts.journey.steps.2.year"></b><strong data-i18n="acts.journey.steps.2.title"></strong><span data-i18n="acts.journey.steps.2.desc"></span></li>
            <li class="rv"><b data-i18n="acts.journey.steps.3.year"></b><strong data-i18n="acts.journey.steps.3.title"></strong><span data-i18n="acts.journey.steps.3.desc"></span></li>
          </ol>
        </div>
      </section>

      <section class="act act-center" id="act-contact" data-act="contact">
        <div class="act-inner">
          <p class="kicker rv" data-i18n="acts.contact.kicker"></p>
          <h2 class="act-title rv" data-i18n="acts.contact.title" data-scramble></h2>
          <p class="act-body rv" data-i18n="acts.contact.body"></p>
          <p class="rv"><a class="cta" href="mailto:hi@example.com"><span class="cta-glyph">✉</span><span data-i18n="acts.contact.cta"></span></a></p>
          <div class="contact-links rv">
            <a href="#" data-i18n="acts.contact.links.0.label"></a>
            <a href="#" data-i18n="acts.contact.links.1.label"></a>
            <a href="#" data-i18n="acts.contact.links.2.label"></a>
          </div>
          <footer class="site-footer rv" data-i18n="acts.contact.footer"></footer>
        </div>
      </section>
    </main>

    <!-- 作品星图（全屏 HUD 覆盖层，内容由 TS 生成） -->
    <div id="atlas" class="atlas" hidden></div>

    <!-- 菜单覆盖层 -->
    <div id="menu-overlay" class="menu-overlay" hidden>
      <nav class="menu-links">
        <a href="#act-vision" data-act-link="vision"><em>01</em><span data-i18n="nav.vision"></span></a>
        <a href="#act-method" data-act-link="method"><em>02</em><span data-i18n="nav.method"></span></a>
        <a href="#act-collab" data-act-link="collab"><em>03</em><span data-i18n="nav.collab"></span></a>
        <a href="#act-works" data-act-link="works"><em>04</em><span data-i18n="nav.works"></span></a>
        <a href="#act-journey" data-act-link="journey"><em>05</em><span data-i18n="nav.journey"></span></a>
        <a href="#act-contact" data-act-link="contact"><em>06</em><span data-i18n="nav.contact"></span></a>
      </nav>
      <div class="menu-foot">
        <a href="mailto:hi@example.com">hi@example.com</a>
        <span data-i18n="acts.contact.footer"></span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
